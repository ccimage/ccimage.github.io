<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>AI Work Learn 文件索引</title>
	<style>
		:root {
			--bg: #f7f8fa;
			--card: #ffffff;
			--text: #1f2937;
			--muted: #6b7280;
			--line: #e5e7eb;
			--link: #0f766e;
			--link-hover: #115e59;
		}

		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
			background: var(--bg);
			color: var(--text);
			line-height: 1.6;
		}

		.container {
			max-width: 760px;
			margin: 48px auto;
			padding: 24px;
			background: var(--card);
			border: 1px solid var(--line);
			border-radius: 12px;
		}

		h1 {
			margin: 0 0 8px;
			font-size: 28px;
		}

		p {
			margin: 0 0 20px;
			color: var(--muted);
		}

		ul {
			margin: 0;
			padding-left: 20px;
		}

		li {
			margin: 8px 0;
		}

		a {
			color: var(--link);
			text-decoration: none;
		}

		a:hover {
			color: var(--link-hover);
			text-decoration: underline;
		}
	</style>
</head>
<body>
	<main class="container">
		<h1>文件索引</h1>
		<p>本页列出当前目录中的 Markdown 与 HTML 文件。</p>

		<ul>
			<li><a href="claude-codex-mcp-cowork.html">claude-codex-mcp-cowork.html</a></li>
			<li><a href="claude-codex-mcp-cowork.md">claude-codex-mcp-cowork.md（原始文件。markdown 格式）</a></li>
		</ul>
	</main>
</body>
</html>
